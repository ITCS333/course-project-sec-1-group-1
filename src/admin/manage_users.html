
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Admin Portal</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
   <link rel="stylesheet" href="../common/styles.css">
   <style>
     body {
          padding: 20px;
     }
     header{
          margin-bottom: 2rem;
          border-bottom: 2px solid #667eea;
           padding-bottom: 1rem;

     }

     h1 {
          color: #333;
          margin: 0;

     }
     section {
          margin-bottom: 2rem;
          background: #f9f9f9;
          padding: 1.5rem;
          border-radius: 8px;

     }
     h2 {
          color: #667eea;
          border-bottom:2px solid #667eea;
          padding-bottom: 0.5rem;
     }

     form{
          background: white;
          padding: 1rem;
          border-radius: 4px;
     }
     fieldset{
           border: 1px solid #ddd;
           padding: 1rem;
           border-radius: 4px;   
     }

     details {
            margin-bottom: 1.5rem;
            background: white;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #ddd;

     }

     summary {

          cursor: pointer;
          font-weight: bold;
          color: #667eea;

     }

     details[open] summary{
          margin-bottom: 1rem;

     }

     h3 {

           margin-top: 1.5rem;
            color: #333;

     }
     #search-input {
           margin-bottom: 1rem;
            width: 100%;
     }

     table {
          width: 100%;
          border-collapse: collapse;
     }
     thead{
          background: #f0f0f0;
     }
     th {
          cursor: pointer;
          padding: 0.75rem;
          text-align: left;
          border-bottom: 2px solid #ddd;
          user-select: none;

     }
     th:hover{
          background: #e8e8e8;
     }

     td {

        padding: 0.75rem;
        border-bottom: 1px solid #ddd;  
     }

     .edit-btn, .delete-btn{

          padding: 0.5rem 1rem;
          margin-right: 0.5rem;
          font-size: 0.9rem;
          cursor: pointer;
          border: none;
          border-radius: 4px;

     }

     .edit-btn{

          background: #667eea;
          color: white;

     }

    .edit-btn:hover {
           background: #5568d3;
     }

     .delete-btn {
           background: #dc3545; 
            color: white;
     }
     .delete-btn:hover {

            background: #c82333;

     }
     button[type="submit"] {
          margin-top: 1rem;
     }

   </style>

</head>

<body>
     <header>
          <h1>Admin Portal</h1>
     </header>

     <main>
          <section>
               <h2>Change Your Password</h2>
               <form id="password-form" action="#">
                    <fieldset>
                         <legend>Password Update</legend>
                         <label for="new-password">New Password</label>
                         <input
                            type="password" 
                            id="new-password" 
                            minlength="8" 
                            required>
                         <label for=   "confirm-password">Confirm Password</label>
                         <input

                             type="password" 
                             id="confirm-password" 
                             required>

                        <button type="submit" id="change">Update Password</button>
                    </fieldset>
               </form>
          </section>

          <section>
               <h2>Manage Users</h2>

               <details>
                    <summary>Add New User</summary>
                    <form id="add-user-form" action="#">
                         <fieldset>
                              <legend>New User Information</legend>

                              <label for="user-name">Full Name</label>
                              <input
                                  type="text" 
                                  id="user-name" 
                                  required>
                              
                              <label for="user-email">Email</label>

                         <input
                            type="email" 
                            id="user-email" 
                            required>
                               
                              <label for="default-password">Default Password</label>
                              <input
                                  type="password" 
                                  id="default-password" 
                                  minlength="8" 
                                  required>
                              
                              <label for="is-admin">Admin Status</label>

                              <select id="is-admin">

                                   <option value="0">Student</option>
                                   <option value="1">Admin</option>

                              </select>

                              <button type="submit" id="add">Add User</button>
                         </fieldset>
                    </form>
               </details>

               <h3>Registered Users</h3>

               <input type="text" id="search-input" placeholder="Search by name or email...">


               <input
                   type="text" 
                   id="search-input" 
                   placeholder="Search by name or email..."> 
               
               <table id="user-table">
                    <thead>
                         <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Admin</th>
                            <th>Actions</th>  
                         </tr>
                    </thead>
                    <tbody id="user-table-body">

                    </tbody>
               </table>    
          
          </section>
     </main>

     <script src="manage_users.js" defer></script>

</body>
</html>
