<!--
  Requirement: Create the Dedicated Page for a Single Week
  Instructions:
  This page displays the full details for one week and allows students
  to read and post discussion comments.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add <meta> tags for charset (UTF-8) and viewport
         (width=device-width, initial-scale=1.0). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Add a <title>, e.g., "Week Details". -->
    <title>Week Details</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-2: #222222;
            --border: #2e2e2e;
            --accent: #c8f04d;
            --accent-dim: rgba(200, 240, 77, 0.12);
            --text: #e8e8e8;
            --text-muted: #888;
            --radius: 10px;
            --font-head: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ─── Header ─── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        header::before {
            content: '';
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--accent);
        }

        header h1 {
            font-family: var(--font-head);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        /* ─── Main layout ─── */
        main {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        @media (max-width: 640px) {
            main { padding: 32px 20px; }
            header { padding: 18px 20px; }
        }

        /* ─── Section / article shared ─── */
        article,
        #discussion-forum {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        h2 {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 1px;
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ─── Week info article ─── */
        #week-start-date {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 28px;
        }

        #week-description {
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.75;
        }

        #week-links-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #week-links-list li a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.88rem;
            font-family: var(--font-mono);
            padding: 6px 12px;
            border: 1px solid rgba(200, 240, 77, 0.2);
            border-radius: 5px;
            display: inline-block;
            transition: background 0.15s;
        }

        #week-links-list li a:hover {
            background: var(--accent-dim);
        }

        /* ─── Discussion forum ─── */
        #discussion-forum h2 {
            margin-bottom: 24px;
        }

        /* Comment list */
        #comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        #comment-list article {
            padding: 16px 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        #comment-list article p {
            font-size: 0.92rem;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.65;
        }

        #comment-list article footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Comment form */
        #comment-form fieldset {
            border: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #comment-form legend {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
            float: left;
            width: 100%;
        }

        #comment-form label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        #comment-form textarea {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #comment-form textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        #comment-form button[type="submit"] {
            align-self: flex-start;
            padding: 10px 24px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s;
        }

        #comment-form button[type="submit"]:hover { opacity: 0.88; transform: translateY(-1px); }
        #comment-form button[type="submit"]:active { transform: translateY(0); }
    </style>

    <!-- Required: link details.js with defer. -->
    <script src="details.js" defer></script>
</head>
<body>

    <!-- TODO: Create a <header>.
         Inside it, add an <h1 id="week-title">.
         details.js will set its textContent to the week's title.
         Leave it empty for now. -->
    <header>
        <h1 id="week-title"></h1>
    </header>

    <!-- TODO: Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Weekly Information
             ============================================================ -->
        <!-- TODO: Use an <article> to display the main weekly information. -->
        <article>

            <!-- TODO: Add a <p id="week-start-date">.
                 details.js will set it to "Starts on: YYYY-MM-DD"
                 using the start_date column from the weeks table. -->
            <p id="week-start-date"></p>

            <!-- TODO: Add a <h2> "Description & Notes". -->
            <h2>Description &amp; Notes</h2>

            <!-- TODO: Add a <p id="week-description">.
                 details.js will set its textContent to the week's
                 description from the weeks table. -->
            <p id="week-description"></p>

            <!-- TODO: Add a <h2> "Exercises & Resources". -->
            <h2>Exercises &amp; Resources</h2>

            <!-- TODO: Add a <ul id="week-links-list">.
                 details.js will populate this list from the links
                 column in the weeks table. That column is a JSON-encoded
                 array of URL strings. Each URL becomes a <li><a> item.
                 Leave the list empty here. -->
            <ul id="week-links-list"></ul>

        </article>
        <!-- End of <article> -->

        <!-- ============================================================
             Section 2: Discussion Forum
             ============================================================ -->
        <!-- TODO: Create a <section id="discussion-forum">. -->
        <section id="discussion-forum">

            <!-- TODO: Add a <h2> "Discussion". -->
            <h2>Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <!-- TODO: Add a <div id="comment-list">.
                 details.js will inject one <article> per comment here.
                 Each comment article follows this structure:
                 <article>
                     <p>Comment text goes here.</p>
                     <footer>Posted by: Author Name</footer>
                 </article>
                 Comments come from the comments_week table
                 (columns: id, week_id, author, text, created_at).
                 Leave the div empty here. -->
            <div id="comment-list"></div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <!-- TODO: Create a <form id="comment-form"> (action="#").
                 The id is required by details.js. -->
            <form id="comment-form" action="#">

                <!-- TODO: Use a <fieldset> to group the controls. -->
                <fieldset>

                    <!-- TODO: Add a <legend>, e.g., "Leave a Comment". -->
                    <legend>Leave a Comment</legend>

                    <!-- TODO: Add a <label> and <textarea> for the comment.
                         - label for="new-comment"
                         - textarea id="new-comment", required
                         - The id must be exactly "new-comment" as
                           details.js reads this element by that id. -->
                    <label for="new-comment">
                        Your Comment
                        <textarea
                            id="new-comment"
                            name="new-comment"
                            rows="4"
                            placeholder="Share your thoughts…"
                            required></textarea>
                    </label>

                    <!-- TODO: Add a submit <button>.
                         - type="submit"
                         - Text: "Post Comment" -->
                    <button type="submit">Post Comment</button>

                </fieldset>
                <!-- End of <fieldset> -->

            </form>
            <!-- End of <form> -->

        </section>
        <!-- End of <section#discussion-forum> -->

    </main>
    <!-- End of <main> -->

</body>
</html>
