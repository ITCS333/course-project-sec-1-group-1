<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Weekly Breakdown</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-2: #222222;
            --border: #2e2e2e;
            --accent: #c8f04d;
            --accent-dim: rgba(200, 240, 77, 0.12);
            --text: #e8e8e8;
            --text-muted: #888;
            --danger: #ff5a5a;
            --danger-dim: rgba(255, 90, 90, 0.1);
            --radius: 10px;
            --font-head: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        header::before {
            content: '';
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--accent);
        }

        header h1 {
            font-family: var(--font-head);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        header h1 span {
            color: var(--accent);
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 40px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 820px) {
            main { grid-template-columns: 1fr; padding: 32px 20px; }
            header { padding: 18px 20px; }
        }

        section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        section h2 {
            font-family: var(--font-head);
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        section h2::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 1px;
            transform: rotate(45deg);
        }

        #week-form {
            padding: 24px;
        }

        fieldset {
            border: none;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        legend {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 4px;
            padding: 0;
            float: left;
            width: 100%;
            margin-bottom: 16px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            resize: vertical;
        }

        input[type="date"] {
            color-scheme: dark;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        textarea { min-height: 80px; }

        button[type="submit"] {
            margin-top: 6px;
            padding: 12px 20px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.02em;
            transition: opacity 0.15s, transform 0.12s;
        }

        button[type="submit"]:hover { opacity: 0.88; transform: translateY(-1px); }
        button[type="submit"]:active { transform: translateY(0); }

        .table-section { grid-column: 2; }

        @media (max-width: 820px) { .table-section { grid-column: 1; } }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead tr {
            border-bottom: 1px solid var(--border);
        }

        thead th {
            text-align: left;
            padding: 14px 20px;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface-2); }

        tbody td {
            padding: 14px 20px;
            vertical-align: top;
            color: var(--text);
            line-height: 1.5;
        }

        tbody td:nth-child(1) { font-weight: 500; }

        tbody td:nth-child(2) {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            white-space: nowrap;
        }

        tbody td:nth-child(3) {
            color: var(--text-muted);
            font-size: 0.84rem;
            max-width: 260px;
        }

        /* Action buttons */
        .actions-cell {
            display: flex;
            gap: 8px;
            white-space: nowrap;
        }

        .edit-btn, .delete-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 5px;
            font-family: var(--font-body);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s;
            letter-spacing: 0.02em;
        }

        .edit-btn {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(200, 240, 77, 0.25);
        }

        .delete-btn {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid rgba(255, 90, 90, 0.2);
        }

        .edit-btn:hover, .delete-btn:hover { opacity: 0.75; transform: translateY(-1px); }
        .edit-btn:active, .delete-btn:active { transform: translateY(0); }

        /* empty state */
        .empty-row td {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-style: italic;
            font-size: 0.85rem;
        }
    </style>

    <script src="admin.js" defer></script>
</head>
<body>

    <header>
        <h1>Manage <span>Weekly</span> Breakdown</h1>
    </header>

    <main>

        <section>

            <h2>Add a New Week</h2>

            <form id="week-form" action="#">

                <fieldset>
                    <legend>Weekly Details</legend>

                    <label for="week-title">
                        Week Title
                        <input
                            type="text"
                            id="week-title"
                            name="week-title"
                            placeholder="Week 1: Introduction to HTML"
                            required>
                    </label>

                    <label for="week-start-date">
                        Start Date
                        <input
                            type="date"
                            id="week-start-date"
                            name="week-start-date"
                            required>
                    </label>

                    <label for="week-description">
                        Description
                        <textarea
                            id="week-description"
                            name="week-description"
                            rows="5"
                            placeholder="Briefly describe this week's content…"></textarea>
                    </label>

                    <label for="week-links">
                        Resource Links <small style="font-weight:300;color:#666">(one URL per line)</small>
                        <textarea
                            id="week-links"
                            name="week-links"
                            rows="3"
                            placeholder="https://example.com/resource-1&#10;https://example.com/resource-2"></textarea>
                    </label>

                    <button id="add-week" type="submit">Add Week</button>

                </fieldset>
                <!-- End of <fieldset> -->
            </form>
        </section>

        <section class="table-section">

            <h2>Current Weekly Breakdown</h2>

            <div class="table-wrapper">
                <table id="weeks-table">

                    <thead>
                        <tr>
                            <th>Week Title</th>
                            <th>Start Date</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <!-- TODO: Create a <tbody id="weeks-tbody">.
                         The id is required by admin.js so it can inject
                         <tr> rows. admin.js will clear and repopulate this
                         tbody whenever the data changes. -->
                    <tbody id="weeks-tbody">

                    </tbody>

                </table>
            </div>
        </section>

    </main>

</body>
</html>
