<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Board</title>
    <script src="board.js" defer></script>
</head>
<body>
    <header>
        <h1>General Discussion Board</h1>
    </header>
    <main>
        <section>
            <h2>Start a New Topic</h2>
            <form id="new-topic-form" action="#" method="POST">
                <fieldset>
                    <legend>New Topic Details</legend>
                    <label for="topic-subject">Subject</label>
                    <input type="text" id="topic-subject" required>
                    <label for="topic-message">Message</label>
                    <textarea id="topic-message" required rows="6"></textarea>
                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>
        <section>
            <h2>All Topics</h2>
            <div id="topic-list-container">
            </div>
        </section>
    </main>
</body>
</html>
