<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Details</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="topic.js" defer></script>
</head>
<body>

    <header>
        <h1 id="topic-subject"></h1>
    </header>

    <main>
        <article id="original-post">
            <p id="op-message"></p>
            <footer id="op-footer"></footer>
            <div>
                <!-- Buttons will be injected by topic.js -->
            </div>
        </article>

        <section id="replies-section">
            <h2>Replies</h2>
            <div id="reply-list-container">
                <!-- Replies will be injected by topic.js -->
            </div>

            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>
                    <label for="new-reply">Reply Message</label>
                    <textarea id="new-reply" required></textarea>
                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>
        </section>
    </main>

</body>
</html>
